<!DOCTYPE html>
<html>
<head>
    <title>Calculadora Québec</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Calculadora Comprar vs Rentar</h1>

    <label>Renta mensual ($):</label><br>
    <input type="number" id="renta"><br><br>

    <label>Precio de la casa ($):</label><br>
    <input type="number" id="precio"><br><br>
<label>Tasa de interés anual (%):</label><br>
<input type="number" id="interes"><br><br>
    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>

    <script>
  function calcular() {
    let renta = document.getElementById("renta").value;
    let precio = document.getElementById("precio").value;
    let interesInput = document.getElementById("interes").value;

    // Validación
    if (renta === "" || precio === "" || interesInput === "") {
        document.getElementById("resultado").innerText = "Por favor completa todos los campos";
        return;
      
    }

    let rentaNum = parseFloat(renta);
    let precioNum = parseFloat(precio);
    let interes = parseFloat(interesInput) / 100 / 12;
    let meses = 25 * 12;

    let hipoteca = (precioNum * interes) / (1 - Math.pow(1 + interes, -meses));

    document.getElementById("resultado").innerHTML =
  "Pago mensual estimado: $" + hipoteca.toFixed(0) + "<br>" +
"Renta: $" + rentaNum + "<br>" +
(hipoteca > rentaNum ? "Comprar es más caro" : "Comprar podría convenir");
       document.getElementById("renta").value = "";
document.getElementById("precio").value = "";
document.getElementById("interes").value = "";
}
      
    </script>
</body>
</html>
