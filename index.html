<!DOCTYPE html>
<html>
<head>
    <title>Calculadora Québec</title>
</head>
<body>
    <h1>Calculadora Comprar vs Rentar</h1>

    <label>Renta mensual ($):</label><br>
    <input type="number" id="renta"><br><br>

    <label>Precio de la casa ($):</label><br>
    <input type="number" id="precio"><br><br>
<label>Tasa de interés anual (%):</label><br>
<input type="number" id="interes"><br><br>
    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>

    <script>
        function calcular() {
            let renta = document.getElementById("renta").value;
            let precio = document.getElementById("precio").value;

            let interes = document.getElementById("interes").value / 100 / 12;
let meses = 25 * 12;

            let hipoteca = (precio * interes) / (1 - Math.pow(1 + interes, -meses));

            document.getElementById("resultado").innerText =
                "Pago hipoteca: $" + hipoteca.toFixed(0) +
                " / Renta: $" + renta +
              (hipoteca > renta ? " → Comprar es más caro" : " → Comprar podría convenir");  
        }
    </script>
</body>
</html>
