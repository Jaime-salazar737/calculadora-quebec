<!DOCTYPE html>
<html>
<head>
    <title>Calculadora Québec</title>
    <style>
     .container {
    background: white;
    max-width: 400px;
    margin: auto;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
}   
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        input {
            display: block;
            padding: 10px;
            margin: 10px auto;
            width: 100%;
            max-width: 250px;
            font-size: 16px;    
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.6;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">    
    <h1>Calculadora Comprar vs Rentar</h1>

    <label>Renta mensual ($):</label><br>
    <input type="number" id="renta"><br><br>

    <label>Precio de la casa ($):</label><br>
    <input type="number" id="precio"><br><br>
<label>Tasa de interés anual (%):</label><br>
<input type="number" id="interes"><br><br>
 <input type="number" id="enganche" placeholder="% Enganche (ej: 20)">   
    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado"></h2>

    <script>
  function calcular() {
    let renta = document.getElementById("renta").value;
    let precio = document.getElementById("precio").value;
    let interesInput = document.getElementById("interes").value;
     let engancheInput = document.getElementById("enganche").value; 

    // Validación
    if (renta === "" || precio === "" || interesInput === "" || engancheInput === "") {
     document.getElementById("resultado").innerText = "⚠️ Por favor completa todos los campos antes de calcular";  
        return;
      
    }

    let rentaNum = parseFloat(renta);
    let precioNum = parseFloat(precio);
    let interes = parseFloat(interesInput) / 100 / 12;
    let meses = 25 * 12;
    let enganche = parseFloat(engancheInput) / 100;

   let montoPrestamo = precioNum * (1 - enganche);
   let hipoteca = (montoPrestamo * interes) / (1 - Math.pow(1 + interes, -meses));

    document.getElementById("resultado").innerHTML =
   "<strong>Resultado:</strong><br><br>" +
    "💰 Pago mensual estimado: $" + hipoteca.toFixed(0) + "<br>" +
    "🏠 Renta actual: $" + rentaNum + "<br>" +
    "📊 Enganche: " + (enganche * 100) + "%<br><br>" +
    (hipoteca > rentaNum 
        ? "❌ En este caso, comprar es más caro que rentar"
        : "✅ En este caso, comprar podría ser mejor que rentar");
       document.getElementById("renta").value = "";
document.getElementById("precio").value = "";
document.getElementById("interes").value = "";
document.getElementById("enganche").value = "";    
}
      
    </script>
    </div>
</body>
</html>
